<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake-Game</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io(1)/favicon1.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <div class="board-border">
                <div class="board">
                </div>
            </div>

            <div class="infos">
                <div class="info">
                    <h3>High Score:
                        <span id="high-score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3> Score:
                        <span id="score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3> Time:
                        <span id="time">00-00</span>
                    </h3>
                </div>
                <div class="info">

                    <button id="pauseButton">Pause</button> <!-- 👈 add here -->
                </div>
            </div>


        </section>
        <div class="modal">
            <div class="start-game">
                <h3>Welcome to the Snake Game</h3>
                <button class="btn btn-start">start Game</button>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>



</html>
